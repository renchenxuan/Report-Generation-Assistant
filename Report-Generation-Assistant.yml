app:
  description: 设备故障报告生成工作流（MVP）
  icon: 🧩
  icon_background: '#E4FBCC'
  mode: workflow
  name: Report-Generation-Assistant
  use_icon_as_answer_icon: false
kind: app
version: 0.5.0
workflow:
  conversation_variables: []
  environment_variables:
  - name: history_dataset_id
    value: REPLACE_WITH_HISTORY_DATASET_ID
  - name: product_dataset_id
    value: REPLACE_WITH_PRODUCT_DATASET_ID
  features:
    file_upload:
      enabled: false
      allowed_file_extensions: []
      allowed_file_types: []
      allowed_file_upload_methods: []
      number_limits: 3
      fileUploadConfig:
        image_file_size_limit: 10
        audio_file_size_limit: 50
        video_file_size_limit: 100
        file_size_limit: 15
        workflow_file_upload_limit: 10
        batch_count_limit: 5
        image_file_batch_limit: 10
        single_chunk_attachment_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    nodes:
    - id: start_input
      position:
        x: 80
        y: 280
      data:
        title: start_input
        type: start
        variables:
        - label: report_id
          variable: report_id
          type: text-input
          required: false
        - label: customer_name
          variable: customer_name
          type: text-input
          required: false
        - label: site_name
          variable: site_name
          type: text-input
          required: false
        - label: device_type
          variable: device_type
          type: text-input
          required: false
        - label: device_model
          variable: device_model
          type: text-input
          required: true
        - label: device_sn
          variable: device_sn
          type: text-input
          required: false
        - label: fault_time
          variable: fault_time
          type: text-input
          required: true
        - label: fault_count
          variable: fault_count
          type: number
          required: false
          default: 1
        - label: fault_description
          variable: fault_description
          type: paragraph
          required: true
        - label: fault_cause
          variable: fault_cause
          type: paragraph
          required: false
        - label: event_record_text
          variable: event_record_text
          type: paragraph
          required: false
        - label: waveform_analysis_text
          variable: waveform_analysis_text
          type: paragraph
          required: false
        - label: overall_appearance_text
          variable: overall_appearance_text
          type: paragraph
          required: false
        - label: upper_board_text
          variable: upper_board_text
          type: paragraph
          required: false
        - label: lower_board_text
          variable: lower_board_text
          type: paragraph
          required: false
        - label: power_device_measure_text
          variable: power_device_measure_text
          type: paragraph
          required: false
        - label: site_research_text
          variable: site_research_text
          type: paragraph
          required: false
        selected: false
      positionAbsolute:
        x: 80
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      height: 108
    - id: preprocess_input
      position:
        x: 340
        y: 280
      data:
        title: preprocess_input
        type: code
        code_language: python3
        variables:
        - variable: report_id
          value_selector:
          - start_input
          - report_id
        - variable: customer_name
          value_selector:
          - start_input
          - customer_name
        - variable: site_name
          value_selector:
          - start_input
          - site_name
        - variable: device_type
          value_selector:
          - start_input
          - device_type
        - variable: device_model
          value_selector:
          - start_input
          - device_model
        - variable: device_sn
          value_selector:
          - start_input
          - device_sn
        - variable: fault_time
          value_selector:
          - start_input
          - fault_time
        - variable: fault_count
          value_selector:
          - start_input
          - fault_count
        - variable: fault_description
          value_selector:
          - start_input
          - fault_description
        - variable: fault_cause
          value_selector:
          - start_input
          - fault_cause
        - variable: event_record_text
          value_selector:
          - start_input
          - event_record_text
        - variable: waveform_analysis_text
          value_selector:
          - start_input
          - waveform_analysis_text
        - variable: overall_appearance_text
          value_selector:
          - start_input
          - overall_appearance_text
        - variable: upper_board_text
          value_selector:
          - start_input
          - upper_board_text
        - variable: lower_board_text
          value_selector:
          - start_input
          - lower_board_text
        - variable: power_device_measure_text
          value_selector:
          - start_input
          - power_device_measure_text
        - variable: site_research_text
          value_selector:
          - start_input
          - site_research_text
        outputs:
          report_id:
            type: string
          normalized_fault_summary:
            type: string
          retrieval_keywords:
            type: string
          possible_parts:
            type: string
          possible_environment_factors:
            type: string
          fact_summary:
            type: string
          fallback_notes:
            type: array[string]
        code: "import re\nfrom datetime import datetime\n\ndef norm(v, default=\"\
          无\"):\n    if v is None:\n        return default\n    s = str(v).strip()\n\
          \    return s if s else default\n\ndef parse_fault_count(v):\n    try:\n\
          \        # Dify start 节点数值控件使用 number，业务侧按整数语义处理\n        f = float(v)\n\
          \        if not f.is_integer():\n            return 1\n        n = int(f)\n\
          \        return n if n >= 1 else 1\n    except Exception:\n        return\
          \ 1\n\ndef sanitize_text(v):\n    s = norm(v, \"无\")\n    return re.sub(r\"\
          \\s+\", \" \", s)\n\ndef validate_datetime(v):\n    s = norm(v, \"\")\n\
          \    if not s:\n        return False\n    try:\n        # 支持 Z 结尾与 ±HH:MM\
          \ 时区偏移（RFC3339 常用子集）\n        datetime.fromisoformat(s.replace(\"Z\", \"\
          +00:00\"))\n        return True\n    except Exception:\n        return False\n\
          \ndef main(report_id, customer_name, site_name, device_type, device_model,\
          \ device_sn, fault_time, fault_count, fault_description, fault_cause, event_record_text,\
          \ waveform_analysis_text, overall_appearance_text, upper_board_text, lower_board_text,\
          \ power_device_measure_text, site_research_text):\n    optional_blank_fields\
          \ = {\"customer_name\", \"site_name\", \"device_type\", \"device_sn\", \"\
          fault_cause\"}\n    missing = []\n    if not str(device_model).strip():\n\
          \        missing.append(\"device_model\")\n    if not str(fault_description).strip():\n\
          \        missing.append(\"fault_description\")\n    if not validate_datetime(fault_time):\n\
          \        missing.append(\"fault_time\")\n    if missing:\n        raise\
          \ ValueError(f\"关键字段缺失或格式不合法: {','.join(missing)}\")\n\n    normalized =\
          \ {\n        \"report_id\": norm(report_id, \"\"),\n        \"customer_name\"\
          : norm(customer_name, \"\"),\n        \"site_name\": norm(site_name, \"\"\
          ),\n        \"device_type\": norm(device_type, \"\"),\n        \"device_model\"\
          : norm(device_model, \"\"),\n        \"device_sn\": norm(device_sn, \"\"\
          ),\n        \"fault_time\": norm(fault_time, \"\"),\n        \"fault_count\"\
          : parse_fault_count(fault_count),\n        \"fault_description\": sanitize_text(fault_description),\n\
          \        \"fault_cause\": sanitize_text(fault_cause),\n        \"event_record_text\"\
          : sanitize_text(event_record_text),\n        \"waveform_analysis_text\"\
          : sanitize_text(waveform_analysis_text),\n        \"overall_appearance_text\"\
          : sanitize_text(overall_appearance_text),\n        \"upper_board_text\"\
          : sanitize_text(upper_board_text),\n        \"lower_board_text\": sanitize_text(lower_board_text),\n\
          \        \"power_device_measure_text\": sanitize_text(power_device_measure_text),\n\
          \        \"site_research_text\": sanitize_text(site_research_text),\n  \
          \  }\n\n    retrieval_keywords = \" \".join([normalized[\"device_model\"\
          ], normalized[\"fault_description\"], normalized[\"fault_cause\"]]).strip()\n\
          \    fact_summary = (\n        f\"客户:{normalized['customer_name']} | 现场:{normalized['site_name']}\
          \ | \"\n        f\"机型:{normalized['device_model']} | 条码:{normalized['device_sn']}\
          \ | \"\n        f\"时间:{normalized['fault_time']} | 数量:{normalized['fault_count']}\
          \ | \"\n        f\"故障:{normalized['fault_description']} | 原因导向:{normalized['fault_cause']}\
          \ | \"\n        f\"事件记录:{normalized['event_record_text']} | 波形:{normalized['waveform_analysis_text']}\
          \ | \"\n        f\"整体外观:{normalized['overall_appearance_text']} | 上板:{normalized['upper_board_text']}\
          \ | \"\n        f\"下板:{normalized['lower_board_text']} | 功率器件:{normalized['power_device_measure_text']}\
          \ | \"\n        f\"现场调研:{normalized['site_research_text']}\"\n    )\n\n\
          \    fallback_notes = []\n    for k, v in normalized.items():\n        if\
          \ k in optional_blank_fields and v == \"\":\n            fallback_notes.append(f\"\
          {k} 为空\")\n        if k.endswith(\"_text\") and v == \"无\":\n          \
          \  fallback_notes.append(f\"{k} 缺失，已兜底为'无'\")\n\n    return {\n        \"\
          report_id\": normalized[\"report_id\"],\n        \"normalized_fault_summary\"\
          : normalized[\"fault_description\"],\n        \"retrieval_keywords\": retrieval_keywords,\n\
          \        \"possible_parts\": normalized[\"device_model\"],\n        \"possible_environment_factors\"\
          : normalized[\"site_name\"],\n        \"fact_summary\": fact_summary,\n\
          \        \"fallback_notes\": fallback_notes,\n    }\n"
        selected: false
      positionAbsolute:
        x: 340
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      height: 99
