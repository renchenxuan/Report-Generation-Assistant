    - id: generate_customer_letter_problem_desc
      position:
        x: 910
        y: 120
      data:
        title: generate_customer_letter_problem_desc
        type: llm
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
          completion_params:
            temperature: 0.2
        vision:
          enabled: false
        prompt_template:
        - role: system
          text: '你是设备故障报告专业撰写人。

            仅基于输入事实与检索证据生成；不得新增未出现事实。

            证据不足必须显式写“【证据不足】”。输出必须是合法 JSON。

            若历史案例与产品知识冲突，优先采用产品知识证据，并在措辞中说明“与历史案例存在差异”。

            '
        - role: user
          text: '【用户输入事实】

            {{#preprocess_input.fact_summary#}}

            【历史案例证据】

            {{#retrieve_history_cases.result#}}

            【产品知识证据】

            {{#retrieve_product_knowledge.result#}}

            输出 JSON:

            {"customer_letter":"...","problem_description_refined":"...","evidence_citation":["..."]}

            '
        selected: false
      positionAbsolute:
        x: 910
        y: 120
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      height: 98
    - id: generate_five_why
      position:
        x: 910
        y: 300
      data:
        title: generate_five_why
        type: llm
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
          completion_params:
            temperature: 0.2
        vision:
          enabled: false
        prompt_template:
        - role: system
          text: '你是设备故障分析专家。仅能使用输入事实和证据，缺失信息必须标注“【证据不足】”。

            输出必须是合法 JSON。

            '
        - role: user
          text: '【输入事实】{{#preprocess_input.fact_summary#}}

            【历史案例证据】{{#retrieve_history_cases.result#}}

            输出 JSON:

            {"five_why_table":[{"question_order":1,"question":"为什么...","analysis":"..."}],"evidence_citation":["..."]}

            '
        selected: false
      positionAbsolute:
        x: 910
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      height: 98
    - id: generate_root_cause_and_responsibility
      position:
        x: 1180
        y: 300
      data:
        title: generate_root_cause_and_responsibility
        type: llm
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
          completion_params:
            temperature: 0.2
        vision:
          enabled: false
        prompt_template:
        - role: system
          text: '你是质量与故障归因专家。

            责任归属仅给建议方向，并标注“【待人工审核】”；证据不足必须显式提示。

            输出必须是合法 JSON。

            responsibility_confidence 打分规则：

            - 证据完整性（0~40）

            - 事实一致性（0~30）

            - 历史案例匹配度（0~30）

            三项求和后输出 0~100 整数。

            '
        - role: user
          text: '【输入事实】{{#preprocess_input.fact_summary#}}

            【历史案例证据】{{#retrieve_history_cases.result#}}

            【产品知识证据】{{#retrieve_product_knowledge.result#}}

            【5Y 分析】{{#generate_five_why.text#}}

            输出 JSON:

            {"root_cause_summary":"...","responsibility_judgement":"...【待人工审核】","evidence_sufficiency":"高/中/低","responsibility_confidence":80,"risk_tips":["..."],"hallucination_check":"无/疑似/确认","evidence_citation":["..."]}

            '
        selected: false
      positionAbsolute:
        x: 1180
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      height: 98
    - id: generate_solution
      position:
        x: 1450
        y: 300
      data:
        title: generate_solution
        type: llm
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
          completion_params:
            temperature: 0.2
        vision:
          enabled: false
        prompt_template:
        - role: system
          text: '你是设备故障整改方案专家。方案必须可执行、可验证、可分配责任，不得新增未给出事实。

            输出必须是合法 JSON。

            '
        - role: user
          text: '【输入事实】{{#preprocess_input.fact_summary#}}

            【根因与责任】{{#generate_root_cause_and_responsibility.text#}}

            【产品知识证据】{{#retrieve_product_knowledge.result#}}

            输出 JSON:

            {"temporary_measures":"...","corrective_actions":"...","preventive_actions":"...","customer_side_actions":"...","internal_quality_actions":"...","site_handling_plan":"...","factory_handling_plan":"...","evidence_citation":["..."]}

            '
        selected: false
