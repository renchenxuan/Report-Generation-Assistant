    - id: assemble_final_json
      position:
        x: 1990
        y: 300
      data:
        title: assemble_final_json
        type: code
        code_language: python3
        variables:
        - variable: report_id
          value_selector:
          - preprocess_input
          - report_id
        - variable: fact_summary
          value_selector:
          - preprocess_input
          - fact_summary
        - variable: fallback_notes
          value_selector:
          - preprocess_input
          - fallback_notes
        - variable: history_result
          value_selector:
          - retrieve_history_cases
          - result
        - variable: product_result
          value_selector:
          - retrieve_product_knowledge
          - result
        - variable: customer_raw
          value_selector:
          - generate_customer_letter_problem_desc
          - text
        - variable: five_why_raw
          value_selector:
          - generate_five_why
          - text
        - variable: root_raw
          value_selector:
          - generate_root_cause_and_responsibility
          - text
        - variable: solution_raw
          value_selector:
          - generate_solution
          - text
        - variable: polish_raw
          value_selector:
          - polish_report_sections
          - text
        outputs:
          final_json:
            type: string
        code: "import json\nCONSERVATIVE_CONFIDENCE_DEFAULT = 30\n\ndef parse_obj(s):\n\
          \    if not s:\n        return {}\n    if isinstance(s, dict):\n       \
          \ return s\n    try:\n        return json.loads(s)\n    except Exception:\n\
          \        return {\"raw_text\": str(s)}\n\ndef ensure_list(v):\n    if isinstance(v,\
          \ list):\n        return v\n    if v is None:\n        return []\n    return\
          \ [str(v)]\n\ndef safe_int(v, default=CONSERVATIVE_CONFIDENCE_DEFAULT):\n\
          \    try:\n        n = int(v)\n        return max(0, min(100, n))\n    except\
          \ (ValueError, TypeError):\n        return default\n\ndef is_retrieval_empty(result):\n\
          \    # 同时兼容 Python/JSON 两类空值序列化结果\n    if result is None:\n        return\
          \ True\n    if isinstance(result, str):\n        return result.strip() in\
          \ [\"\", \"[]\", \"None\", \"null\"]\n    if isinstance(result, (list, dict,\
          \ tuple, set)):\n        return len(result) == 0\n    return False\n\ndef\
          \ main(report_id, fact_summary, fallback_notes, history_result, product_result,\
          \ customer_raw, five_why_raw, root_raw, solution_raw, polish_raw):\n   \
          \ customer = parse_obj(customer_raw)\n    five_why = parse_obj(five_why_raw)\n\
          \    root = parse_obj(root_raw)\n    solution = parse_obj(solution_raw)\n\
          \    polish = parse_obj(polish_raw)\n\n    history_empty = is_retrieval_empty(history_result)\n\
          \    product_empty = is_retrieval_empty(product_result)\n    raw_confidence\
          \ = root.get(\"responsibility_confidence\", None)\n    confidence = safe_int(raw_confidence,\
          \ CONSERVATIVE_CONFIDENCE_DEFAULT)\n    risk_tips = ensure_list(root.get(\"\
          risk_tips\", []))\n    if raw_confidence is None:\n        risk_tips.append(f\"\
          【风险提示】responsibility_confidence 缺失，已按保守默认值{CONSERVATIVE_CONFIDENCE_DEFAULT}处理\"\
          )\n\n    merged = {\n        \"report_id\": report_id,\n        \"customer_letter\"\
          : polish.get(\"customer_letter\") or customer.get(\"customer_letter\") or\
          \ \"【证据不足】\",\n        \"problem_description_refined\": polish.get(\"problem_description_refined\"\
          ) or customer.get(\"problem_description_refined\") or \"【证据不足】\",\n    \
          \    \"five_why_table\": polish.get(\"five_why_table\") or five_why.get(\"\
          five_why_table\") or [],\n        \"root_cause_summary\": polish.get(\"\
          root_cause_summary\") or root.get(\"root_cause_summary\") or \"【证据不足】\"\
          ,\n        \"responsibility_judgement\": polish.get(\"responsibility_judgement\"\
          ) or root.get(\"responsibility_judgement\") or \"【待人工审核】\",\n        \"\
          temporary_measures\": polish.get(\"temporary_measures\") or solution.get(\"\
          temporary_measures\") or \"【证据不足】\",\n        \"corrective_actions\": polish.get(\"\
          corrective_actions\") or solution.get(\"corrective_actions\") or \"【证据不足】\"\
          ,\n        \"preventive_actions\": polish.get(\"preventive_actions\") or\
          \ solution.get(\"preventive_actions\") or \"【证据不足】\",\n        \"customer_side_actions\"\
          : polish.get(\"customer_side_actions\") or solution.get(\"customer_side_actions\"\
          ) or \"【证据不足】\",\n        \"internal_quality_actions\": polish.get(\"internal_quality_actions\"\
          ) or solution.get(\"internal_quality_actions\") or \"【证据不足】\",\n       \
          \ \"site_handling_plan\": polish.get(\"site_handling_plan\") or solution.get(\"\
          site_handling_plan\") or \"【证据不足】\",\n        \"factory_handling_plan\"\
          : polish.get(\"factory_handling_plan\") or solution.get(\"factory_handling_plan\"\
          ) or \"【证据不足】\",\n        \"audit_metrics\": {\n            \"evidence_sufficiency\"\
          : root.get(\"evidence_sufficiency\", \"中\"),\n            \"responsibility_confidence\"\
