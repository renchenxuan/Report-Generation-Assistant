        title: retrieve_history_cases
        type: knowledge-retrieval
        dataset_ids:
        - '{{#env.history_dataset_id#}}'
        query_variable_selector:
        - preprocess_input
        - retrieval_keywords
        retrieval_mode: multiple
        top_k: 5
        score_threshold_enabled: false
        selected: false
      positionAbsolute:
        x: 620
        y: 170
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      height: 99
    - id: retrieve_product_knowledge
      position:
        x: 620
        y: 390
      data:
        title: retrieve_product_knowledge
        type: knowledge-retrieval
        dataset_ids:
        - '{{#env.product_dataset_id#}}'
        query_variable_selector:
        - preprocess_input
        - retrieval_keywords
        retrieval_mode: multiple
        top_k: 5
        score_threshold_enabled: false
        selected: false
      positionAbsolute:
        x: 620
        y: 390
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
