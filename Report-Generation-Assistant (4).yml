        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gpt-4o-mini
          provider: openai
        prompt_template:
        - id: system-prompt
          role: system
          text: |
            你是设备故障报告专业撰写人。仅基于给定事实生成，不得新增未提供事实。
            若证据不足，需在对应字段标注“【证据不足】”。
            输出必须是合法 JSON，且仅包含以下键：
            customer_letter, problem_description_refined, temporary_measures, five_why_table, root_cause_summary,
            responsibility_judgement, corrective_actions, preventive_actions, customer_side_actions,
            internal_quality_actions, evidence_citation, audit_metrics。
            其中 audit_metrics 必含键：evidence_sufficiency, responsibility_confidence, risk_tips, hallucination_check。
            responsibility_confidence 必须是 0-100 的整数。
        - id: user-prompt
          role: user
          text: |
            【基础事实】
            {{#1000000000002.fact_summary#}}

            【故障摘要】
            {{#1000000000002.normalized_fault_summary#}}

            【检索状态】
            {{#1000000000002.retrieval_status#}}

            【兜底说明】
            {{#1000000000002.fallback_notes#}}

            请按上述要求输出 JSON。
        selected: false
        structured_output_enabled: false
        title: generate_report_sections
        type: llm
        variables: []
        vision:
          enabled: false
      height: 220
