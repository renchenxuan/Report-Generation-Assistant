    - data:
        code: |
          import json

          def main(
              llm_text: str,
              report_id: str,
              customer_name: str,
              site_name: str,
              device_model: str,
              device_sn: str,
              fault_time: str,
              fault_count: int,
              fault_description: str,
              retrieval_status: str,
              fallback_notes: list,
              missing_required_fields: list
          ) -> dict:
              try:
                  generated = json.loads(llm_text)
              except Exception:
                  generated = {
                      'customer_letter': '【证据不足】模型输出非JSON，需人工补充。',
                      'problem_description_refined': fault_description,
                      'temporary_measures': '【证据不足】需人工补充。',
                      'five_why_table': [],
                      'root_cause_summary': '【证据不足】需人工审核。',
                      'responsibility_judgement': '【待人工审核】证据不足，仅建议方向。',
                      'corrective_actions': '【证据不足】需人工补充。',
                      'preventive_actions': '【证据不足】需人工补充。',
                      'customer_side_actions': '【证据不足】需人工补充。',
                      'internal_quality_actions': '【证据不足】需人工补充。',
                      'evidence_citation': ['仅使用用户输入事实（MVP无知识库）'],
                      'audit_metrics': {
                          'evidence_sufficiency': '低',
                          'responsibility_confidence': 30,
                          'risk_tips': ['模型输出解析失败，已启用兜底内容'],
                          'hallucination_check': '疑似'
                      }
                  }

              if 'audit_metrics' not in generated or not isinstance(generated['audit_metrics'], dict):
                  generated['audit_metrics'] = {}
              generated['audit_metrics'].setdefault('evidence_sufficiency', '中')
              generated['audit_metrics'].setdefault('responsibility_confidence', 60)
              generated['audit_metrics'].setdefault('risk_tips', [])
              generated['audit_metrics'].setdefault('hallucination_check', '无')

              confidence = generated['audit_metrics'].get('responsibility_confidence', 60)
              try:
                  confidence = int(confidence)
              except Exception:
                  confidence = 60
              confidence = max(0, min(100, confidence))
              generated['audit_metrics']['responsibility_confidence'] = confidence

              if retrieval_status == 'failed':
                  generated['audit_metrics']['risk_tips'].append('未接入知识库，仅基于输入事实分析。')

              if missing_required_fields:
                  generated['audit_metrics']['risk_tips'].append(
                      '核心字段缺失：' + ', '.join(missing_required_fields)
                  )

              final_json = {
                  'report_id': report_id,
                  'basic_info': {
                      'customer_name': customer_name,
                      'site_name': site_name,
                      'device_model': device_model,
                      'device_sn': device_sn,
                      'fault_time': fault_time,
                      'fault_count': fault_count,
                      'fault_description': fault_description
                  },
                  'sections': generated,
                  'audit_metrics': generated.get('audit_metrics', {}),
                  'ext_info': {
                      'retrieval_status': retrieval_status,
                      'fallback_notes': fallback_notes,
                      'missing_required_fields': missing_required_fields
                  }
              }

              return {
                  'final_json': json.dumps(final_json, ensure_ascii=False, indent=2)
              }
        code_language: python3
        desc: 聚合最终JSON并做兜底校验
