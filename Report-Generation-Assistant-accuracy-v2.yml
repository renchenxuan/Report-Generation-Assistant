    - data:
        code: |
          import json

          DEFAULT_CONFIDENCE = 60
          LOW_EVIDENCE_MAX_CONFIDENCE = 40
          LOW_INPUT_QUALITY_MAX_CONFIDENCE = 35
          CITATION_DEFAULT_CLAIM = '未命名结论'
          CITATION_DEFAULT_SOURCE = '未知来源'
          CITATION_DEFAULT_QUOTE = '未提供引用片段'
          CITATION_FALLBACK = [{'claim': '用户输入事实', 'source': 'fact_summary', 'quote': '用户输入事实'}]

          def _parse_json(text, fallback):
              try:
                  if isinstance(text, dict):
                      return text
                  parsed = json.loads(text)
                  return parsed if isinstance(parsed, dict) else fallback
              except (json.JSONDecodeError, TypeError):
                  return fallback

          def _ensure_list(v):
              if isinstance(v, list):
                  return v
              if v is None:
                  return []
              return [v]

          def _normalize_confidence(v):
              corrected = False
              score = DEFAULT_CONFIDENCE
              try:
                  if isinstance(v, str):
                      score = round(float(v.strip()))
                  else:
                      score = round(float(v))
              except (ValueError, TypeError):
                  score = DEFAULT_CONFIDENCE
                  corrected = True
              bounded = max(0, min(100, score))
              if bounded != score:
                  corrected = True
              return bounded, corrected

          def _normalize_citations(values):
              out = []
              for item in _ensure_list(values):
                  if isinstance(item, dict):
                      claim = str(item.get('claim', '')).strip() or CITATION_DEFAULT_CLAIM
                      source = str(item.get('source', '')).strip() or CITATION_DEFAULT_SOURCE
                      quote = str(item.get('quote', '')).strip() or CITATION_DEFAULT_QUOTE
                      out.append({'claim': claim, 'source': source, 'quote': quote})
                  else:
                      s = str(item).strip()
                      if s:
                          out.append({'claim': s, 'source': CITATION_DEFAULT_SOURCE, 'quote': s})
              return out

          def main(
              report_id: str,
              customer_name: str,
              site_name: str,
              device_model: str,
              device_sn: str,
              fault_time: str,
              fault_count: int,
              fault_description: str,
              missing_required_fields: list,
              history_cases_snippets: list,
              product_knowledge_snippets: list,
              history_retrieval_status: str,
              product_retrieval_status: str,
              history_retrieval_notes: list,
              product_retrieval_notes: list,
              n5_text: str,
              n6_text: str,
              n6_validated_text: str,
              n7_text: str,
              n8_text: str,
              n9_text: str,
              consistency_warnings: list,
              input_quality_score: int = 100,
              input_quality_level: str = 'high',
              input_quality_issues: list = None,
              input_quality_recommendation: str = '',
              input_quality_should_proceed: bool = True
          ) -> dict:
              citation_fallback = CITATION_FALLBACK

              n5 = _parse_json(n5_text, {
                  'customer_letter': '【证据不足】需人工补充。',
                  'problem_description_refined': fault_description,
                  'evidence_citation': citation_fallback
              })
              n6 = _parse_json(n6_validated_text or n6_text, {
                  'five_why_table': [],
                  'evidence_citation': citation_fallback
              })
              n7 = _parse_json(n7_text, {
                  'root_cause_summary': '【证据不足】需人工审核。',
                  'responsibility_judgement': '【证据不足】【待人工审核】仅建议责任方向。',
                  'audit_metrics': {
                      'evidence_sufficiency': '低',
                      'responsibility_confidence': DEFAULT_CONFIDENCE,
                      'risk_tips': ['根因与责任节点输出解析失败，已使用兜底。'],
                      'hallucination_check': '疑似'
                  },
                  'evidence_citation': citation_fallback
              })
              n8 = _parse_json(n8_text, {
                  'temporary_measures': '【证据不足】需人工补充。',
                  'corrective_actions': '【证据不足】需人工补充。',
                  'preventive_actions': '【证据不足】需人工补充。',
                  'customer_side_actions': '【证据不足】需人工补充。',
                  'internal_quality_actions': '【证据不足】需人工补充。',
                  'evidence_citation': citation_fallback
              })
              n9 = _parse_json(n9_text, {})

              audit_metrics_raw = n7.get('audit_metrics', {}) if isinstance(n7, dict) else {}
              audit_metrics = audit_metrics_raw if isinstance(audit_metrics_raw, dict) else {}
              audit_metrics.setdefault('evidence_sufficiency', '中')
              audit_metrics.setdefault('responsibility_confidence', DEFAULT_CONFIDENCE)
              audit_metrics.setdefault('risk_tips', [])
              audit_metrics.setdefault('hallucination_check', '无')
              audit_metrics['risk_tips'] = [str(x) for x in _ensure_list(audit_metrics.get('risk_tips', []))]

              normalized_score, corrected = _normalize_confidence(audit_metrics.get('responsibility_confidence'))
              if str(audit_metrics.get('evidence_sufficiency')) == '低' and normalized_score > LOW_EVIDENCE_MAX_CONFIDENCE:
                  normalized_score = LOW_EVIDENCE_MAX_CONFIDENCE
                  audit_metrics['risk_tips'].append(f'evidence_sufficiency=低，responsibility_confidence 已按上限 {LOW_EVIDENCE_MAX_CONFIDENCE} 限制。')
              audit_metrics['responsibility_confidence'] = normalized_score
              if corrected:
                  audit_metrics['risk_tips'].append('responsibility_confidence 非法或越界，已自动校正到 0~100 整数范围。')

              if history_retrieval_status in ('failed', 'no_knowledge_base') or product_retrieval_status in ('failed', 'no_knowledge_base'):
                  audit_metrics['risk_tips'].append('检索证据不足：当前链路未接入知识库，仅基于输入事实。')

              if missing_required_fields:
                  audit_metrics['risk_tips'].append('核心字段缺失：' + ', '.join(missing_required_fields))

              if str(input_quality_level).strip() in ('low', 'critical'):
                  audit_metrics['risk_tips'].append(f'输入质量等级为{input_quality_level}，建议人工重点复核。')
                  if normalized_score > LOW_INPUT_QUALITY_MAX_CONFIDENCE:
                      normalized_score = LOW_INPUT_QUALITY_MAX_CONFIDENCE
                      audit_metrics['responsibility_confidence'] = normalized_score
                      audit_metrics['risk_tips'].append(
                          f'输入质量较低，responsibility_confidence 已按上限 {LOW_INPUT_QUALITY_MAX_CONFIDENCE} 限制。'
                      )

              if not bool(input_quality_should_proceed):
                  audit_metrics['risk_tips'].append('输入质量门控建议暂停自动生成并转人工处理。')

              for issue in _ensure_list(input_quality_issues):
                  issue_text = str(issue).strip()
                  if issue_text:
                      audit_metrics['risk_tips'].append('输入质量问题：' + issue_text)

              if str(input_quality_recommendation).strip():
                  audit_metrics['risk_tips'].append('输入质量建议：' + str(input_quality_recommendation).strip())

              for tip in _ensure_list(consistency_warnings):
                  if str(tip).strip():
                      audit_metrics['risk_tips'].append(str(tip).strip())

              sections = {
                  'customer_letter': n9.get('customer_letter', n5.get('customer_letter', '【证据不足】需人工补充。')),
                  'problem_description_refined': n9.get('problem_description_refined', n5.get('problem_description_refined', fault_description)),
                  'five_why_table': n9.get('five_why_table', n6.get('five_why_table', [])),
                  'root_cause_summary': n9.get('root_cause_summary', n7.get('root_cause_summary', '【证据不足】需人工审核。')),
                  'responsibility_judgement': n9.get('responsibility_judgement', n7.get('responsibility_judgement', '【证据不足】【待人工审核】仅建议责任方向。')),
                  'temporary_measures': n9.get('temporary_measures', n8.get('temporary_measures', '【证据不足】需人工补充。')),
                  'corrective_actions': n9.get('corrective_actions', n8.get('corrective_actions', '【证据不足】需人工补充。')),
                  'preventive_actions': n9.get('preventive_actions', n8.get('preventive_actions', '【证据不足】需人工补充。')),
                  'customer_side_actions': n9.get('customer_side_actions', n8.get('customer_side_actions', '【证据不足】需人工补充。')),
                  'internal_quality_actions': n9.get('internal_quality_actions', n8.get('internal_quality_actions', '【证据不足】需人工补充。'))
              }

              evidence_citation = []
              evidence_citation.extend(_normalize_citations(n5.get('evidence_citation', [])))
              evidence_citation.extend(_normalize_citations(n6.get('evidence_citation', [])))
              evidence_citation.extend(_normalize_citations(n7.get('evidence_citation', [])))
              evidence_citation.extend(_normalize_citations(n8.get('evidence_citation', [])))
              evidence_citation.extend(_normalize_citations(n9.get('evidence_citation', [])))
              if not evidence_citation:
                  evidence_citation = citation_fallback

              final_json = {
                  'report_id': report_id,
                  'basic_info': {
                      'customer_name': customer_name,
                      'site_name': site_name,
                      'device_model': device_model,
                      'device_sn': device_sn,
                      'fault_time': fault_time,
                      'fault_count': fault_count,
                      'fault_description': fault_description
                  },
                  'sections': sections,
                  'evidence_citation': evidence_citation,
                  'audit_metrics': audit_metrics,
                  'ext_info': {
                      'missing_required_fields': missing_required_fields,
                      'history_retrieval_status': history_retrieval_status,
                      'product_retrieval_status': product_retrieval_status,
                      'history_retrieval_notes': history_retrieval_notes,
                      'product_retrieval_notes': product_retrieval_notes,
                      'history_cases_snippets': history_cases_snippets,
                      'product_knowledge_snippets': product_knowledge_snippets,
                      'consistency_warnings': _ensure_list(consistency_warnings),
                      'input_quality': {
                          'score': input_quality_score,
                          'level': input_quality_level,
                          'issues': _ensure_list(input_quality_issues),
                          'recommendation': input_quality_recommendation,
                          'should_proceed': bool(input_quality_should_proceed)
                      }
                  }
              }

              return {
                  'final_json': json.dumps(final_json, ensure_ascii=False, indent=2)
              }
