    - data:
        code: |
          import re

          def _norm(v, default='无'):
              if v is None:
                  return default
              s = str(v).strip()
              return s if s else default

          def _to_int(v, default=1):
              try:
                  n = int(str(v).strip())
                  return n if n > 0 else default
              except (ValueError, TypeError):
                  return default

          def _keywords(*parts):
              tokens = []
              for p in parts:
                  s = _norm(p, '')
                  if not s:
                      continue
                  for t in re.split(r'[\s,，;；。.!！？/\\|-]+', s):
                      t = t.strip()
                      if len(t) >= 2:
                          tokens.append(t)
              dedup = []
              seen = set()
              for t in tokens:
                  if t not in seen:
                      seen.add(t)
                      dedup.append(t)
              return dedup[:12]

          def main(
              report_id: str = '',
              customer_name: str = '',
              site_name: str = '',
              device_model: str = '',
              device_sn: str = '',
              fault_time: str = '',
              fault_count: str = '1',
              fault_description: str = '',
              fault_cause: str = '',
              event_record_text: str = '',
              waveform_analysis_text: str = '',
              overall_appearance_text: str = '',
              upper_board_text: str = '',
              lower_board_text: str = '',
              power_device_measure_text: str = '',
              site_research_text: str = ''
          ) -> dict:
              missing = []
              if not str(device_model).strip():
                  missing.append('device_model')
              if not str(fault_time).strip():
                  missing.append('fault_time')
              if not str(fault_description).strip():
                  missing.append('fault_description')

              normalized_fault_summary = '；'.join([
                  f"机型：{_norm(device_model, '')}",
                  f"时间：{_norm(fault_time, '')}",
                  f"问题：{_norm(fault_description, '')}",
                  f"导向：{_norm(fault_cause)}"
              ])

              retrieval_keywords = _keywords(
                  device_model,
                  fault_description,
                  fault_cause,
                  event_record_text,
                  waveform_analysis_text
              )

              possible_parts = _keywords(
                  upper_board_text,
                  lower_board_text,
                  power_device_measure_text
              )
              possible_environment_factors = _keywords(site_research_text, overall_appearance_text)

              fact_summary = '\n'.join([
                  f"客户名称：{_norm(customer_name)}",
                  f"现场名称：{_norm(site_name)}",
                  f"设备型号：{_norm(device_model, '')}",
                  f"设备条码：{_norm(device_sn)}",
                  f"故障时间：{_norm(fault_time, '')}",
                  f"故障数量：{_to_int(fault_count)}",
                  f"故障描述：{_norm(fault_description, '')}",
                  f"故障原因导向：{_norm(fault_cause)}",
                  f"事件记录分析：{_norm(event_record_text)}",
                  f"波形分析：{_norm(waveform_analysis_text)}",
                  f"整体外观分析：{_norm(overall_appearance_text)}",
                  f"开盖上层板分析：{_norm(upper_board_text)}",
                  f"开盖下层板分析：{_norm(lower_board_text)}",
                  f"功率器件测量分析：{_norm(power_device_measure_text)}",
                  f"现场调研分析：{_norm(site_research_text)}"
              ])

              return {
                  'report_id': _norm(report_id, ''),
                  'customer_name': _norm(customer_name),
                  'site_name': _norm(site_name),
                  'device_model': _norm(device_model, ''),
                  'device_sn': _norm(device_sn),
                  'fault_time': _norm(fault_time, ''),
                  'fault_count': _to_int(fault_count),
                  'fault_description': _norm(fault_description, ''),
                  'fault_cause': _norm(fault_cause),
                  'normalized_fault_summary': normalized_fault_summary,
                  'retrieval_keywords': retrieval_keywords,
                  'possible_parts': possible_parts,
                  'possible_environment_factors': possible_environment_factors,
                  'fact_summary': fact_summary,
                  'missing_required_fields': missing
              }
