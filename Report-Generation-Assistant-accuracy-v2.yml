    - data:
        code: |
          import json

          def _parse(text):
              try:
                  if isinstance(text, dict):
                      return text
                  return json.loads(text)
              except Exception:
                  return {}

          def main(n6_text: str = '') -> dict:
              raw = _parse(n6_text)
              table = raw.get('five_why_table', []) if isinstance(raw, dict) else []
              warnings = []
              sanitized = []
              expected = 1
              for item in table:
                  if not isinstance(item, dict):
                      warnings.append('five_why_table 存在非对象条目，已忽略。')
                      continue
                  idx = item.get('question_index')
                  try:
                      idx = int(idx)
                  except Exception:
                      idx = expected
                      warnings.append('question_index 非数字，已按顺序重排。')
                  if idx != expected:
                      warnings.append(f'question_index 非递增（期望 {expected}，实际 {idx}），已重排。')
                      idx = expected
                  q = str(item.get('question', '')).strip() or '【证据不足】问题需人工补充。'
                  a = str(item.get('analysis', '')).strip() or '【证据不足】分析需人工补充。'
                  sanitized.append({'question_index': idx, 'question': q, 'analysis': a})
                  expected += 1
                  if expected > 5:
                      break

              while len(sanitized) < 5:
                  i = len(sanitized) + 1
                  sanitized.append({
                      'question_index': i,
                      'question': '【证据不足】问题需人工补充。',
                      'analysis': '【证据不足】分析需人工补充。'
                  })
                  warnings.append('5Y 项不足 5 层，已补齐占位。')

              out = {
                  'five_why_table': sanitized,
                  'evidence_citation': raw.get('evidence_citation', []) if isinstance(raw, dict) else []
              }
              return {
                  'validated_five_why_text': json.dumps(out, ensure_ascii=False),
                  'five_why_validation_warnings': warnings
              }
        code_language: python3
        desc: 5Y 结构校验与重排
