    - data:
        code: |
          def main(
              missing_required_fields: list = None,
              fault_description: str = '',
              fault_count: int = 1,
              event_record_text: str = '',
              waveform_analysis_text: str = '',
              overall_appearance_text: str = '',
              upper_board_text: str = '',
              lower_board_text: str = '',
              power_device_measure_text: str = '',
              site_research_text: str = '',
              device_model: str = '',
              fault_time: str = '',
              device_sn: str = ''
          ) -> dict:
              quality_score = 100
              quality_issues = []

              missing = missing_required_fields or []
              if missing:
                  quality_score -= len(missing) * 15
                  quality_issues.append('核心必填字段缺失: ' + ', '.join(missing))

              fault_desc_len = len(fault_description.strip()) if fault_description else 0
              if fault_desc_len < 20:
                  quality_score -= 25
                  quality_issues.append(f'故障描述过于简略（{fault_desc_len}字，建议≥20字）')
              elif fault_desc_len < 50:
                  quality_score -= 10
                  quality_issues.append(f'故障描述较短（{fault_desc_len}字），建议补充更多细节')

              if fault_count > 10:
                  quality_issues.append(f'故障数量异常（{fault_count}），请确认是否准确')

              analysis_fields = {
                  'event_record_text': '事件记录分析',
                  'waveform_analysis_text': '波形分析',
                  'overall_appearance_text': '整体外观分析',
                  'upper_board_text': '开盖上层板分析',
                  'lower_board_text': '开盖下层板分析',
                  'power_device_measure_text': '功率器件测量分析',
                  'site_research_text': '现场调研分析'
              }

              provided_analysis = []
              missing_analysis = []
              for field, label in analysis_fields.items():
                  value = locals().get(field, '')
                  if value and len(value.strip()) > 10:
                      provided_analysis.append(label)
                  else:
                      missing_analysis.append(label)

              if len(provided_analysis) == 0:
                  quality_score -= 20
                  quality_issues.append('缺少所有分析数据（事件记录、波形分析、外观分析等），报告质量将严重受限')
              elif len(provided_analysis) <= 2:
                  quality_score -= 10
                  quality_issues.append('分析数据较少（仅' + str(len(provided_analysis)) + '项），建议补充: ' + ', '.join(missing_analysis[:3]))

              if not device_sn or not device_sn.strip():
                  quality_issues.append('设备条码为空，可能影响产品知识检索准确性')

              if fault_time and len(fault_time.strip()) < 8:
                  quality_issues.append(f'故障时间格式可能不规范（{fault_time}），建议使用YYYY-MM-DD格式')

              quality_score = max(0, quality_score)
              if quality_score >= 80:
                  quality_level = 'high'
                  recommendation = '输入质量良好，可继续执行工作流'
              elif quality_score >= 60:
                  quality_level = 'medium'
                  recommendation = '输入质量一般，建议补充部分信息以提高报告准确性'
              elif quality_score >= 40:
                  quality_level = 'low'
                  recommendation = '输入质量较差，强烈建议人工审核并补充关键信息'
              else:
                  quality_level = 'critical'
                  recommendation = '输入质量极差，建议拒绝自动生成并返回人工填写'

              return {
                  'quality_score': quality_score,
                  'quality_level': quality_level,
                  'quality_issues': quality_issues,
                  'provided_analysis_count': len(provided_analysis),
                  'missing_analysis_fields': missing_analysis,
                  'recommendation': recommendation,
                  'should_proceed': quality_score >= 40
              }
        code_language: python3
        desc: 输入质量检查：验证必填字段、描述详细度、分析数据完整性
